[tool.uv.workspace]
members = [
    "packages/common",
    "services/api-gateway",
    "services/policy-engine",
    "services/document-generator",
    "services/dsar-service",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "httpx>=0.27.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.mypy]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["common.config", "app.config", "common.db.session"]
ignore_errors = true